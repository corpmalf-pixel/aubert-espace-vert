<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-labelledby="title desc">
  <title id="title">Aubert Espace Vert</title>
  <desc id="desc">Logo textuel Aubert Espace Vert avec emblème rond arbre</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9f277"/>
      <stop offset="100%" stop-color="#8fb24a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9f277"/>
      <stop offset="100%" stop-color="#a6c85a"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.72  0 1 0 0 0.82  0 0 1 0 0.45  0 0 0 0.18 0"/>
    </filter>
  </defs>

  <g transform="translate(12 8)">
    <g transform="translate(0 0)">
      <circle cx="82" cy="82" r="76" fill="#0a3d24" stroke="url(#ring)" stroke-width="4"/>
      <circle cx="82" cy="82" r="82" fill="none" stroke="#143d29" stroke-width="4" opacity="0.9"/>
      <g stroke="#6d8f68" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M82 136 C80 120, 80 102, 82 82" stroke-width="8"/>
        <path d="M82 96 C68 82, 54 76, 40 72" stroke-width="5"/>
        <path d="M82 88 C96 76, 110 70, 124 66" stroke-width="5"/>
        <path d="M82 74 C72 58, 64 48, 60 36" stroke-width="4"/>
        <path d="M82 74 C92 58, 100 46, 104 34" stroke-width="4"/>
        <path d="M82 136 C68 144, 56 146, 44 150" stroke-width="3"/>
        <path d="M82 136 C96 144, 108 146, 120 150" stroke-width="3"/>
      </g>
      <g fill="url(#leaf)" stroke="#173e28" stroke-width="1.2">
        <ellipse cx="47" cy="60" rx="10" ry="5" transform="rotate(-25 47 60)"/>
        <ellipse cx="59" cy="50" rx="10" ry="5" transform="rotate(-42 59 50)"/>
        <ellipse cx="72" cy="42" rx="10" ry="5" transform="rotate(-58 72 42)"/>
        <ellipse cx="88" cy="40" rx="10" ry="5" transform="rotate(84 88 40)"/>
        <ellipse cx="103" cy="46" rx="10" ry="5" transform="rotate(52 103 46)"/>
        <ellipse cx="116" cy="58" rx="10" ry="5" transform="rotate(28 116 58)"/>
        <ellipse cx="34" cy="78" rx="11" ry="5.5" transform="rotate(-10 34 78)"/>
        <ellipse cx="52" cy="76" rx="11" ry="5.5" transform="rotate(-32 52 76)"/>
        <ellipse cx="67" cy="66" rx="11" ry="5.5" transform="rotate(-44 67 66)"/>
        <ellipse cx="96" cy="64" rx="11" ry="5.5" transform="rotate(42 96 64)"/>
        <ellipse cx="111" cy="74" rx="11" ry="5.5" transform="rotate(24 111 74)"/>
        <ellipse cx="129" cy="82" rx="11" ry="5.5" transform="rotate(8 129 82)"/>
        <ellipse cx="42" cy="97" rx="10" ry="5" transform="rotate(-40 42 97)"/>
        <ellipse cx="58" cy="92" rx="10" ry="5" transform="rotate(-18 58 92)"/>
        <ellipse cx="107" cy="91" rx="10" ry="5" transform="rotate(18 107 91)"/>
        <ellipse cx="122" cy="98" rx="10" ry="5" transform="rotate(40 122 98)"/>
      </g>
    </g>

    <g transform="translate(182 34)">
      <text x="0" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="74" letter-spacing="2" fill="#0d4729">AUBERT</text>
      <text x="6" y="108" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="8" fill="#0d4729">ESPACE VERT</text>
      <ellipse cx="144" cy="74" rx="148" ry="52" fill="#b7cd85" opacity="0.14" filter="url(#softGlow)"/>
    </g>
  </g>
</svg>
